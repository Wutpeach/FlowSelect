name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download yt-dlp
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "yt-dlp.exe" }
          $downloadUrl = $asset.browser_download_url

          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          Invoke-WebRequest -Uri $downloadUrl -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"

          Write-Host "Downloaded yt-dlp from: $downloadUrl"

      - name: Download Deno
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/denoland/deno/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "deno-x86_64-pc-windows-msvc.zip" }
          $downloadUrl = $asset.browser_download_url

          # 下载 zip 文件
          Invoke-WebRequest -Uri $downloadUrl -OutFile "deno.zip"

          # 解压到 binaries 目录 (保持文件名为 deno.exe)
          Expand-Archive -Path "deno.zip" -DestinationPath "src-tauri/binaries" -Force

          # 清理 zip 文件
          Remove-Item "deno.zip"

          Write-Host "Downloaded Deno from: $downloadUrl"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build videodl-server
        shell: pwsh
        run: |
          # Clone videodl repo
          git clone --depth 1 https://github.com/CharlesPikachu/videodl.git videodl-repo

          # Install dependencies
          pip install pyinstaller
          pip install -r videodl-repo/requirements.txt
          pip install fastapi uvicorn janus

          # Install videodl package
          pip install -e videodl-repo

          # Copy our custom http_server.py
          Copy-Item "scripts/videodl_http_server.py" -Destination "videodl-repo/http_server.py"

          # Create build script inline
          $buildScript = @'
          import os, sys, subprocess, glob
          from pathlib import Path

          ROOT = Path(__file__).parent
          DATA_FILES = [
              ("videodl/modules/cdm/*.wvd", "videodl/modules/cdm"),
              ("videodl/modules/js/youtube/*.js", "videodl/modules/js/youtube"),
              ("videodl/modules/js/xmflv/*.js", "videodl/modules/js/xmflv"),
              ("videodl/modules/js/xmflv/*.wasm", "videodl/modules/js/xmflv"),
              ("videodl/modules/js/tencent/*.js", "videodl/modules/js/tencent"),
              ("videodl/modules/js/tencent/*.wasm", "videodl/modules/js/tencent"),
              ("videodl/modules/js/cctv/*.js", "videodl/modules/js/cctv"),
          ]

          cmd = [sys.executable, "-m", "PyInstaller", "--onefile", "--name", "videodl-server", "--console", "--noconfirm"]

          for imp in ["videodl", "videodl.videodl", "uvicorn", "uvicorn.logging", "uvicorn.loops", "uvicorn.loops.auto",
                      "uvicorn.protocols", "uvicorn.protocols.http", "uvicorn.protocols.http.auto",
                      "uvicorn.protocols.websockets", "uvicorn.protocols.websockets.auto",
                      "uvicorn.lifespan", "uvicorn.lifespan.on", "fastapi", "starlette", "pydantic", "janus",
                      "requests", "curl_cffi", "curl_cffi.requests"]:
              cmd.extend(["--hidden-import", imp])

          for src, dest in DATA_FILES:
              for match in glob.glob(str(ROOT / src)):
                  cmd.extend(["--add-data", f"{match};{dest}"])

          cmd.append("http_server.py")
          subprocess.run(cmd, cwd=ROOT, check=True)
          '@

          Set-Content -Path "videodl-repo/build_ci.py" -Value $buildScript

          # Run build
          cd videodl-repo
          python build_ci.py

          # Copy to binaries
          Copy-Item "dist/videodl-server.exe" -Destination "../src-tauri/binaries/videodl-server-x86_64-pc-windows-msvc.exe"

          Write-Host "Built videodl-server.exe successfully"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version in config files
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          # Update package.json
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "package.json"

          # Update tauri.conf.json
          $tauri = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json"

          # Update Cargo.toml - only replace version in [package] section
          $cargoPath = "src-tauri/Cargo.toml"
          $lines = Get-Content $cargoPath
          $inPackage = $false
          $updated = $false
          $newLines = @()
          foreach ($line in $lines) {
            if ($line -match '^\[package\]') {
              $inPackage = $true
            } elseif ($line -match '^\[') {
              $inPackage = $false
            }
            if ($inPackage -and !$updated -and $line -match '^version\s*=') {
              $newLines += "version = `"$version`""
              $updated = $true
            } else {
              $newLines += $line
            }
          }
          $newLines | Set-Content $cargoPath

          Write-Host "Updated all config files to version: $version"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        run: npm run tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: msi-installer
          path: artifacts/msi

      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: nsis-installer
          path: artifacts/nsis

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if pre-release
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlowSelect v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/msi/*.msi
            artifacts/nsis/*.exe
