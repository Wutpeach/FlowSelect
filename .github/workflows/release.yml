name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download yt-dlp
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "yt-dlp.exe" }
          $downloadUrl = $asset.browser_download_url

          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          Invoke-WebRequest -Uri $downloadUrl -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"

          Write-Host "Downloaded yt-dlp from: $downloadUrl"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version in config files
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          # Update package.json
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "package.json"

          # Update tauri.conf.json
          $tauri = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json"

          # Update Cargo.toml
          $cargo = Get-Content "src-tauri/Cargo.toml" -Raw
          $cargo = $cargo -replace 'version = "[\d.]+"', "version = `"$version`""
          Set-Content "src-tauri/Cargo.toml" $cargo

          Write-Host "Updated all config files to version: $version"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        run: npm run tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: msi-installer
          path: artifacts/msi

      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: nsis-installer
          path: artifacts/nsis

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if pre-release
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlowSelect v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/msi/*.msi
            artifacts/nsis/*.exe
