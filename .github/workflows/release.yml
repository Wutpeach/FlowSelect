name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download yt-dlp
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "yt-dlp.exe" }
          $downloadUrl = $asset.browser_download_url

          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          Invoke-WebRequest -Uri $downloadUrl -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"

          Write-Host "Downloaded yt-dlp from: $downloadUrl"

      - name: Download Deno
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/denoland/deno/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "deno-x86_64-pc-windows-msvc.zip" }
          $downloadUrl = $asset.browser_download_url

          # 下载 zip 文件
          Invoke-WebRequest -Uri $downloadUrl -OutFile "deno.zip"

          # 解压到 binaries 目录 (保持文件名为 deno.exe)
          Expand-Archive -Path "deno.zip" -DestinationPath "src-tauri/binaries" -Force

          # 清理 zip 文件
          Remove-Item "deno.zip"

          Write-Host "Downloaded Deno from: $downloadUrl"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version in config files
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          # Update package.json
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "package.json"

          # Update tauri.conf.json
          $tauri = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json"

          # Update Cargo.toml - only replace version in [package] section
          $cargoPath = "src-tauri/Cargo.toml"
          $lines = Get-Content $cargoPath
          $inPackage = $false
          $updated = $false
          $newLines = @()
          foreach ($line in $lines) {
            if ($line -match '^\[package\]') {
              $inPackage = $true
            } elseif ($line -match '^\[') {
              $inPackage = $false
            }
            if ($inPackage -and !$updated -and $line -match '^version\s*=') {
              $newLines += "version = `"$version`""
              $updated = $true
            } else {
              $newLines += $line
            }
          }
          $newLines | Set-Content $cargoPath

          Write-Host "Updated all config files to version: $version"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        run: npm run tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13      # Intel
            arch: x86_64
            target: x86_64-apple-darwin
            yt_dlp_asset: yt-dlp_macos_legacy
            deno_asset: deno-x86_64-apple-darwin.zip
          - runner: macos-latest  # Apple Silicon (M1/M2)
            arch: aarch64
            target: aarch64-apple-darwin
            yt_dlp_asset: yt-dlp_macos
            deno_asset: deno-aarch64-apple-darwin.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download yt-dlp
        run: |
          RELEASE_JSON=$(curl -s https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest)
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | grep -o '"browser_download_url": "[^"]*${{ matrix.yt_dlp_asset }}"' | cut -d'"' -f4)

          mkdir -p src-tauri/binaries
          curl -L "$DOWNLOAD_URL" -o "src-tauri/binaries/yt-dlp-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/yt-dlp-${{ matrix.target }}"

          echo "Downloaded yt-dlp from: $DOWNLOAD_URL"

      - name: Download Deno
        run: |
          RELEASE_JSON=$(curl -s https://api.github.com/repos/denoland/deno/releases/latest)
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | grep -o '"browser_download_url": "[^"]*${{ matrix.deno_asset }}"' | cut -d'"' -f4)

          curl -L "$DOWNLOAD_URL" -o deno.zip
          unzip deno.zip -d src-tauri/binaries

          # Keep simple name for resources (not sidecar)
          chmod +x src-tauri/binaries/deno
          rm deno.zip

          echo "Downloaded Deno from: $DOWNLOAD_URL"

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version in config files
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update package.json using Node.js
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          # Update tauri.conf.json using Node.js
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
          "

          # Update Cargo.toml using sed
          sed -i.bak '0,/^version = /s/^version = .*/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

          echo "Updated all config files to version: $VERSION"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-installer-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: msi-installer
          path: artifacts/msi

      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: nsis-installer
          path: artifacts/nsis

      - name: Download macOS Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg-installer-x86_64
          path: artifacts/dmg-intel

      - name: Download macOS ARM DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg-installer-aarch64
          path: artifacts/dmg-arm

      - name: Rename DMG files for clarity
        run: |
          # Rename Intel DMG
          for f in artifacts/dmg-intel/*.dmg; do
            mv "$f" "${f%.dmg}_x64.dmg"
          done

          # Rename ARM DMG
          for f in artifacts/dmg-arm/*.dmg; do
            mv "$f" "${f%.dmg}_arm64.dmg"
          done

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if pre-release
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlowSelect v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/msi/*.msi
            artifacts/nsis/*.exe
            artifacts/dmg-intel/*.dmg
            artifacts/dmg-arm/*.dmg
