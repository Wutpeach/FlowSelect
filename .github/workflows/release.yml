name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download yt-dlp
        shell: pwsh
        run: |
          $downloadUrl = "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"

          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          Invoke-WebRequest -Uri $downloadUrl -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe" -MaximumRetryCount 3 -RetryIntervalSec 5

          Write-Host "Downloaded yt-dlp from: $downloadUrl"

      - name: Download Deno
        shell: pwsh
        run: |
          $downloadUrl = "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip"

          # 下载 zip 文件
          Invoke-WebRequest -Uri $downloadUrl -OutFile "deno.zip" -MaximumRetryCount 3 -RetryIntervalSec 5

          # 解压到 binaries 目录 (保持文件名为 deno.exe)
          Expand-Archive -Path "deno.zip" -DestinationPath "src-tauri/binaries" -Force

          # 清理 zip 文件
          Remove-Item "deno.zip"

          Write-Host "Downloaded Deno from: $downloadUrl"

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $downloadUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials"

          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath -MaximumRetryCount 3 -RetryIntervalSec 5
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $ffmpegBinary = Get-ChildItem -Path $extractDir -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if (-not $ffmpegBinary) {
            throw "ffmpeg.exe not found in extracted archive"
          }

          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          Copy-Item $ffmpegBinary.FullName "src-tauri/binaries/ffmpeg.exe" -Force

          Write-Host "Downloaded FFmpeg from: $downloadUrl"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_VERSION=$VERSION

          if [[ "$VERSION" == *"-"* ]]; then
            BASE_VERSION=${VERSION%%-*}
            PRE_RELEASE=${VERSION#*-}
            PRE_RELEASE_NUMBER=$(echo "$PRE_RELEASE" | grep -oE '[0-9]+' | tail -n 1)

            if [[ -z "$PRE_RELEASE_NUMBER" ]]; then
              PRE_RELEASE_NUMBER=1
            fi

            if (( PRE_RELEASE_NUMBER > 65535 )); then
              echo "MSI pre-release identifier cannot exceed 65535: $PRE_RELEASE_NUMBER"
              exit 1
            fi

            BUILD_VERSION="${BASE_VERSION}-${PRE_RELEASE_NUMBER}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
          echo "MSI-safe build version: $BUILD_VERSION"

      - name: Update version in config files
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.build_version }}"
          node ./scripts/update-version.mjs $version

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build Pinterest sidecar
        run: node ./scripts/build-pinterest-sidecar.mjs --target x86_64-pc-windows-msvc

      - name: Smoke test Pinterest sidecar
        run: node ./scripts/smoke-pinterest-sidecar.mjs --mode binary --target x86_64-pc-windows-msvc

      - name: Build Tauri application
        run: npm run tauri build

      - name: Package Windows portable ZIP
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/package-portable.ps1 -Version "${{ steps.version.outputs.version }}" -SkipBuild -SkipYtdlpUpdate

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: src-tauri/target/release/bundle/portable/*.zip
          if-no-files-found: error

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
            target: x86_64-apple-darwin
            yt_dlp_asset: yt-dlp_macos
            deno_asset: deno-x86_64-apple-darwin.zip
          - runner: macos-15
            arch: aarch64
            target: aarch64-apple-darwin
            yt_dlp_asset: yt-dlp_macos
            deno_asset: deno-aarch64-apple-darwin.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download yt-dlp
        run: |
          DOWNLOAD_URL="https://github.com/yt-dlp/yt-dlp/releases/latest/download/${{ matrix.yt_dlp_asset }}"

          mkdir -p src-tauri/binaries
          curl -fL --retry 3 --retry-delay 5 "$DOWNLOAD_URL" -o "src-tauri/binaries/yt-dlp-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/yt-dlp-${{ matrix.target }}"

          echo "Downloaded yt-dlp from: $DOWNLOAD_URL"

      - name: Download Deno
        run: |
          DOWNLOAD_URL="https://github.com/denoland/deno/releases/latest/download/${{ matrix.deno_asset }}"

          curl -fL --retry 3 --retry-delay 5 "$DOWNLOAD_URL" -o deno.zip
          unzip -o deno.zip -d src-tauri/binaries

          # Keep simple name for resources (not sidecar)
          chmod +x src-tauri/binaries/deno
          rm deno.zip

          echo "Downloaded Deno from: $DOWNLOAD_URL"

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version in config files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node ./scripts/update-version.mjs "$VERSION"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build Pinterest sidecar
        run: node ./scripts/build-pinterest-sidecar.mjs --target ${{ matrix.target }}

      - name: Smoke test Pinterest sidecar
        run: node ./scripts/smoke-pinterest-sidecar.mjs --mode binary --target ${{ matrix.target }}

      - name: Build Tauri application bundle
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles app

      - name: Package macOS DMG
        run: npm run package:macos-open-source-dmg -- --target ${{ matrix.target }} --arch ${{ matrix.arch }} --version "${{ steps.version.outputs.version }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-installer-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: msi-installer
          path: artifacts/msi

      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: nsis-installer
          path: artifacts/nsis

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: artifacts/portable

      - name: Download macOS Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg-installer-x86_64
          path: artifacts/dmg-intel

      - name: Download macOS ARM DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg-installer-aarch64
          path: artifacts/dmg-arm

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if pre-release
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve release notes
        id: release_notes
        run: |
          RELEASE_NOTES="release-notes/v${{ steps.version.outputs.version }}.md"
          if [[ ! -f "$RELEASE_NOTES" ]]; then
            echo "::error::Missing release notes file: $RELEASE_NOTES"
            echo "Create and commit the versioned release note before pushing the tag."
            exit 1
          fi

          echo "path=$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "Using release notes: $RELEASE_NOTES"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlowSelect v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: false
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            artifacts/msi/*.msi
            artifacts/nsis/*.exe
            artifacts/portable/*.zip
            artifacts/dmg-intel/*.dmg
            artifacts/dmg-arm/*.dmg
