name: Release

on:
  push:
    tags:
      - "v*"

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in config files
        shell: pwsh
        run: node ./scripts/update-version.mjs "${{ steps.version.outputs.version }}"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download yt-dlp
        shell: pwsh
        run: |
          $downloadUrl = "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"
          New-Item -ItemType Directory -Force -Path "desktop-assets/binaries" | Out-Null
          Invoke-WebRequest -Uri $downloadUrl -OutFile "desktop-assets/binaries/yt-dlp-x86_64-pc-windows-msvc.exe" -MaximumRetryCount 3 -RetryIntervalSec 5

      - name: Download Deno
        shell: pwsh
        run: |
          $downloadUrl = "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "flowselect-deno.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "flowselect-deno"

          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath -MaximumRetryCount 3 -RetryIntervalSec 5
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          Copy-Item (Join-Path $extractDir "deno.exe") "desktop-assets/binaries/deno.exe" -Force

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $downloadUrl = "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.0.1/ffmpeg-windows-x64.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "flowselect-ffmpeg.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "flowselect-ffmpeg"

          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath -MaximumRetryCount 3 -RetryIntervalSec 5
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $ffmpegBinary = Get-ChildItem -Path $extractDir -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if (-not $ffmpegBinary) {
            throw "ffmpeg.exe not found in extracted archive"
          }

          Copy-Item $ffmpegBinary.FullName "desktop-assets/binaries/ffmpeg.exe" -Force

      - name: Ensure gallery-dl binary
        run: npm run runtime:ensure:gallery-dl -- --target x86_64-pc-windows-msvc

      - name: Build Windows NSIS installer
        run: npm run package:win

      - name: Package Windows portable ZIP
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/package-portable.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer
          path: dist-release/FlowSelect_*_windows_x64_installer.exe
          if-no-files-found: error

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-portable
          path: dist-release/portable/FlowSelect_*_windows_x64_portable.zip
          if-no-files-found: error

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
            target: x86_64-apple-darwin
            artifact_arch: x64
            deno_asset: deno-x86_64-apple-darwin.zip
            ffmpeg_asset: ffmpeg-osx-x64.zip
          - runner: macos-15
            arch: aarch64
            target: aarch64-apple-darwin
            artifact_arch: arm64
            deno_asset: deno-aarch64-apple-darwin.zip
            ffmpeg_asset: ffmpeg-osx-arm64.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in config files
        run: node ./scripts/update-version.mjs "${{ steps.version.outputs.version }}"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download yt-dlp
        run: |
          mkdir -p desktop-assets/binaries
          curl -fL --retry 3 --retry-delay 5 \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" \
            -o "desktop-assets/binaries/yt-dlp-${{ matrix.target }}"
          chmod +x "desktop-assets/binaries/yt-dlp-${{ matrix.target }}"

      - name: Download Deno
        run: |
          curl -fL --retry 3 --retry-delay 5 \
            "https://github.com/denoland/deno/releases/latest/download/${{ matrix.deno_asset }}" \
            -o "$RUNNER_TEMP/flowselect-deno.zip"
          unzip -o "$RUNNER_TEMP/flowselect-deno.zip" -d "$RUNNER_TEMP/flowselect-deno"
          cp "$RUNNER_TEMP/flowselect-deno/deno" "desktop-assets/binaries/deno"
          chmod +x "desktop-assets/binaries/deno"

      - name: Download FFmpeg
        run: |
          curl -fL --retry 3 --retry-delay 5 \
            "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.0.1/${{ matrix.ffmpeg_asset }}" \
            -o "$RUNNER_TEMP/flowselect-ffmpeg.zip"
          unzip -o "$RUNNER_TEMP/flowselect-ffmpeg.zip" -d "$RUNNER_TEMP/flowselect-ffmpeg"
          FFMPEG_BINARY=$(find "$RUNNER_TEMP/flowselect-ffmpeg" -type f -name "ffmpeg" | head -n 1)
          if [[ -z "$FFMPEG_BINARY" ]]; then
            echo "::error::ffmpeg binary not found in extracted archive"
            exit 1
          fi
          cp "$FFMPEG_BINARY" "desktop-assets/binaries/ffmpeg"
          chmod +x "desktop-assets/binaries/ffmpeg"

      - name: Ensure gallery-dl binary
        run: npm run runtime:ensure:gallery-dl -- --target ${{ matrix.target }}

      - name: Package macOS ZIP and open-source DMG
        run: |
          npm run package:macos-open-source-dmg -- --arch ${{ matrix.arch }} --version "${{ steps.version.outputs.version }}"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-dmg-${{ matrix.artifact_arch }}
          path: dist-release/dmg/FlowSelect_*_macos_${{ matrix.artifact_arch }}_installer.dmg
          if-no-files-found: error

      - name: Upload macOS ZIP artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-zip-${{ matrix.artifact_arch }}
          path: dist-release/FlowSelect_*_macos_${{ matrix.artifact_arch }}.zip
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-installer
          path: artifacts/windows-installer

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-portable
          path: artifacts/windows-portable

      - name: Download macOS x64 DMG
        uses: actions/download-artifact@v5
        with:
          name: macos-dmg-x64
          path: artifacts/macos-dmg-x64

      - name: Download macOS arm64 DMG
        uses: actions/download-artifact@v5
        with:
          name: macos-dmg-arm64
          path: artifacts/macos-dmg-arm64

      - name: Download macOS x64 ZIP
        uses: actions/download-artifact@v5
        with:
          name: macos-zip-x64
          path: artifacts/macos-zip-x64

      - name: Download macOS arm64 ZIP
        uses: actions/download-artifact@v5
        with:
          name: macos-zip-arm64
          path: artifacts/macos-zip-arm64

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release notes
        id: release_notes
        run: |
          RELEASE_NOTES="release-notes/v${{ steps.version.outputs.version }}.md"
          if [[ ! -f "$RELEASE_NOTES" ]]; then
            echo "::error::Missing release notes file: $RELEASE_NOTES"
            echo "Create and commit the versioned release note before pushing the tag."
            exit 1
          fi

          echo "path=$RELEASE_NOTES" >> "$GITHUB_OUTPUT"

      - name: Generate updater manifest
        run: |
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          node ./scripts/generate-updater-manifest.mjs \
            --version "${{ steps.version.outputs.version }}" \
            --release-tag "v${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --notes-file "${{ steps.release_notes.outputs.path }}" \
            --pub-date "$PUB_DATE" \
            --artifacts-dir artifacts \
            --output artifacts/updater/latest.json

      - name: Package browser extension release asset
        run: |
          node ./scripts/package-browser-extension.mjs \
            --version "${{ steps.version.outputs.version }}" \
            --output-dir artifacts/browser-extension

      - name: Create GitHub Release Draft
        uses: softprops/action-gh-release@v2
        with:
          name: FlowSelect v${{ steps.version.outputs.version }}
          draft: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: false
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            artifacts/windows-installer/*.exe
            artifacts/windows-portable/*.zip
            artifacts/macos-dmg-x64/*.dmg
            artifacts/macos-dmg-arm64/*.dmg
            artifacts/macos-zip-x64/*.zip
            artifacts/macos-zip-arm64/*.zip
            artifacts/browser-extension/*.zip
            artifacts/updater/latest.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            gh release edit "$TAG" --draft=false --prerelease
          else
            gh release edit "$TAG" --draft=false
          fi
