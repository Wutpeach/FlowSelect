<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="1160" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text x="54" y="70" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Browser extension install flow</text>
  <text x="54" y="104" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Load the local extension folder, then open FlowSelect until the popup reports Connected.</text>

  <g filter="url(#shadow)">
    <rect x="54" y="146" width="198" height="150" rx="22" fill="#0B1120" stroke="#1D4ED8" stroke-width="2"/>
    <circle cx="98" cy="188" r="18" fill="#1D4ED8"/>
    <text x="91" y="194" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">1</text>
    <text x="78" y="228" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Open Extensions</text>
    <text x="78" y="260" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Chrome / Edge</text>
    <text x="78" y="284" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Enable Developer Mode</text>

    <rect x="286" y="146" width="198" height="150" rx="22" fill="#0B1120" stroke="#1D4ED8" stroke-width="2"/>
    <circle cx="330" cy="188" r="18" fill="#1D4ED8"/>
    <text x="323" y="194" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">2</text>
    <text x="310" y="228" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Load unpacked</text>
    <text x="310" y="260" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Choose folder:</text>
    <text x="310" y="284" fill="#93C5FD" font-family="Consolas, monospace" font-size="16">browser-extension/</text>

    <rect x="518" y="146" width="198" height="150" rx="22" fill="#0B1120" stroke="#1D4ED8" stroke-width="2"/>
    <circle cx="562" cy="188" r="18" fill="#1D4ED8"/>
    <text x="555" y="194" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">3</text>
    <text x="542" y="228" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Start desktop app</text>
    <text x="542" y="260" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Run FlowSelect</text>
    <text x="542" y="284" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">WebSocket auto-starts</text>

    <rect x="750" y="146" width="198" height="150" rx="22" fill="#0B1120" stroke="#1D4ED8" stroke-width="2"/>
    <circle cx="794" cy="188" r="18" fill="#1D4ED8"/>
    <text x="787" y="194" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">4</text>
    <text x="774" y="228" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Open popup</text>
    <text x="774" y="260" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Check quality / AE options</text>
    <text x="774" y="284" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Make sure it can connect</text>

    <rect x="982" y="146" width="164" height="150" rx="22" fill="#082F49" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="1026" cy="188" r="18" fill="#22C55E"/>
    <text x="1019" y="194" fill="#052E16" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">5</text>
    <text x="1006" y="228" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Connected</text>
    <text x="1006" y="260" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="16">Pick videos from supported sites</text>
  </g>

  <path d="M252 221H286" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
  <path d="M484 221H518" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
  <path d="M716 221H750" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
  <path d="M948 221H982" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
</svg>
