<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <circle cx="1040" cy="620" r="180" fill="#1D4ED8" opacity="0.12"/>
  <circle cx="160" cy="140" r="120" fill="#22D3EE" opacity="0.08"/>

  <text x="80" y="102" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Settings, naming rules, and updater</text>
  <text x="80" y="142" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">The settings window controls folder routing, shortcut reveal, AE import, and yt-dlp maintenance.</text>

  <rect x="120" y="190" width="440" height="480" rx="28" fill="url(#panel)" stroke="#1E3A8A" stroke-width="2" filter="url(#shadow)"/>
  <text x="156" y="240" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Settings</text>

  <text x="156" y="292" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Theme</text>
  <rect x="156" y="308" width="168" height="42" rx="14" fill="#172554"/>
  <rect x="336" y="308" width="168" height="42" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="220" y="335" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Black</text>
  <text x="405" y="335" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">White</text>

  <text x="156" y="386" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Output Folder</text>
  <rect x="156" y="402" width="348" height="42" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="180" y="429" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Desktop/FlowSelect_Received</text>

  <text x="156" y="480" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Global Shortcut</text>
  <rect x="156" y="496" width="220" height="42" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="190" y="523" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">Ctrl + Shift + Space</text>

  <text x="156" y="574" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Launch at startup</text>
  <rect x="434" y="562" width="70" height="34" rx="17" fill="#1D4ED8"/>
  <circle cx="482" cy="579" r="13" fill="#EFF6FF"/>

  <rect x="620" y="190" width="460" height="240" rx="28" fill="url(#panel)" stroke="#1D4ED8" stroke-width="2" filter="url(#shadow)"/>
  <text x="656" y="240" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Rename downloaded media</text>
  <text x="656" y="280" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Keep downloads tidy with deterministic numbering.</text>
  <rect x="656" y="316" width="124" height="34" rx="17" fill="#1D4ED8"/>
  <circle cx="758" cy="333" r="13" fill="#EFF6FF"/>
  <rect x="656" y="374" width="166" height="44" rx="14" fill="#172554"/>
  <text x="696" y="402" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Prefix + Sequence</text>
  <rect x="842" y="374" width="90" height="44" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="868" y="402" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">Flow</text>
  <rect x="946" y="374" width="98" height="44" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="972" y="402" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16">done</text>

  <rect x="620" y="456" width="460" height="214" rx="28" fill="url(#panel)" stroke="#1D4ED8" stroke-width="2" filter="url(#shadow)"/>
  <text x="656" y="506" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">yt-dlp version</text>
  <text x="656" y="542" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Installed: 2026.01.01</text>
  <text x="656" y="576" fill="#FCA5A5" font-family="Segoe UI, Arial, sans-serif" font-size="18">Update available: 2026.02.14</text>
  <rect x="656" y="606" width="164" height="40" rx="14" fill="#172554"/>
  <text x="699" y="631" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Update yt-dlp</text>
  <rect x="844" y="606" width="200" height="40" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="870" y="631" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Also available from main window</text>
</svg>
