<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowSelect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 200px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%);
      color: #eee;
    }
    .container { text-align: center; }
    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1e3a5f, #0a1628);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(64, 158, 255, 0.3);
    }
    .logo svg { width: 28px; height: 28px; fill: #60a5fa; }
    .title {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .status-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f87171;
      box-shadow: 0 0 8px #f87171;
    }
    .status-dot.connected {
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    .status-text { font-size: 13px; color: #aaa; }
    .refresh-btn {
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 6px;
      background: transparent;
      color: #60a5fa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover {
      background: rgba(96, 165, 250, 0.1);
      border-color: rgba(96, 165, 250, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1 class="title">FlowSelect</h1>
    <div class="status-card">
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Disconnected</span>
      </div></div>
    <button class="refresh-btn" id="refreshBtn">Reconnect</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
