<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowSelect</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="flowselect-theme-black">
  <main class="flowselect-popup">
    <header class="flowselect-popup-header">
      <div class="flowselect-popup-logo">
      <svg viewBox="0 0 24 24"><path d="M11.75 6.406c-1.48 0-1.628.157-2.394.157C8.718 6.563 6.802 5 5.845 5S3.77 5.563 3.77 7.188v1.875c.002.492.18 2 .88 1.597c-.827.978-.91 2.119-.899 3.223c-.223.064-.45.137-.671.212c-.684.234-1.41.532-1.737.744a.75.75 0 0 0 .814 1.26c.156-.101.721-.35 1.408-.585l.228-.075c.046.433.161.83.332 1.19l-.024.013c-.41.216-.79.465-1.032.623l-.113.074a.75.75 0 1 0 .814 1.26l.131-.086c.245-.16.559-.365.901-.545q.12-.064.231-.116C6.763 19.475 9.87 20 11.75 20s4.987-.525 6.717-2.148q.11.052.231.116c.342.18.656.385.901.545l.131.086a.75.75 0 0 0 .814-1.26l-.113-.074a13 13 0 0 0-1.032-.623l-.024-.013c.171-.36.286-.757.332-1.19l.228.075c.687.235 1.252.484 1.409.585a.75.75 0 0 0 .813-1.26c-.327-.212-1.053-.51-1.736-.744a16 16 0 0 0-.672-.213c.012-1.104-.072-2.244-.9-3.222c.7.403.88-1.105.881-1.598V7.188C19.73 5.563 18.613 5 17.655 5c-.957 0-2.873 1.563-3.51 1.563c-.767 0-.915-.157-2.395-.157m-.675 9.194c.202-.069.441-.1.675-.1s.473.031.676.1c.1.034.22.088.328.174a.62.62 0 0 1 .246.476c0 .23-.139.39-.246.476s-.229.14-.328.174c-.203.069-.442.1-.676.1s-.473-.031-.675-.1a1.1 1.1 0 0 1-.329-.174a.62.62 0 0 1-.246-.476c0-.23.139-.39.246-.476s.23-.14.329-.174m2.845-3.1c.137-.228.406-.5.81-.5s.674.272.81.5c.142.239.21.527.21.813s-.068.573-.21.811c-.136.229-.406.501-.81.501s-.673-.272-.81-.5a1.6 1.6 0 0 1-.21-.812c0-.286.068-.574.21-.812m-5.96 0c.137-.228.406-.5.81-.5s.674.272.81.5c.142.239.21.527.21.813s-.068.573-.21.811c-.136.229-.406.501-.81.501s-.673-.272-.81-.5a1.6 1.6 0 0 1-.21-.812c0-.286.068-.574.21-.812"/></svg>
      </div>
      <div class="flowselect-popup-meta">
        <div class="flowselect-popup-title" id="popupTitle">FlowSelect</div>
        <div class="flowselect-popup-subtitle" id="popupSubtitle">Extension</div>
      </div>
    </header>

    <section class="flowselect-popup-card flowselect-status-card" id="statusCard" data-connected="false" data-state="offline">
      <div class="flowselect-status-main">
        <span class="flowselect-status-dot" id="statusDot"></span>
        <span class="flowselect-status-text" id="statusText">Offline</span>
      </div>
      <div class="flowselect-status-hint" id="statusHint">Open desktop app to connect.</div>
    </section>

    <section class="flowselect-popup-card">
      <div class="flowselect-section-header">
        <div class="flowselect-section-title" id="actionsSectionTitle">Quick Action</div>
      </div>
      <button type="button" class="flowselect-action-btn" id="downloadCurrentVideoButton">
        Download Current Video
      </button>
      <div class="flowselect-action-hint" id="downloadCurrentVideoHint">
        Use this when a page blocks the native video context menu.
      </div>
    </section>

    <section class="flowselect-popup-card">
      <div class="flowselect-section-header">
        <div class="flowselect-section-title" id="qualitySectionTitle">Quality</div>
      </div>
      <div class="flowselect-quality-grid" id="qualityGrid"></div>
      <div class="flowselect-quality-hint" id="highestQualityHint" data-visible="false" hidden aria-live="polite" aria-hidden="true">
        <span class="flowselect-quality-hint-icon" aria-hidden="true">i</span>
        <span class="flowselect-quality-hint-text" id="highestQualityHintText">
          Some high-quality videos may enter the transcode queue after download.
        </span>
      </div>
    </section>
  </main>
  <script src="direct-download-quality.js"></script>
  <script src="locale-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
